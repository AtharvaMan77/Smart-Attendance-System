<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
        }
        .header {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .logo {
            height: 110px;
        }
        .welcome {
            text-align: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            margin-top: 40px;
            animation: fade 2s ease-in-out;
        }
        @keyframes fade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
        }
        .card {

            width: 420px;
            padding: 50px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
        }
        .btn {
            width: 230px;
            padding: 14px;
            margin: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        .student {
            background: #27ae60;
        }
        .student:hover {
            background: #1e8449;
            transform: scale(1.05);
        }
        .faculty {
            background: #2980b9;
        }
        .faculty:hover {
            background: #1f618d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://mmcoe.edugrievance.com/assets/LMS/OSS/logo/20230117084049603.409" class="logo">
    </div>
    <div class="welcome">
        Smart Attendance System
    </div>
    <div class="container">
        <div class="card">
            <h2>Select Login</h2>
            <button class="btn student" onclick="window.location.href='/student_login'">
                Student Login
            </button>
            <br>
            <button class="btn faculty" onclick="window.location.href='/faculty_login'">
                Faculty Login
            </button>
        </div>
    </div>
</body>
</html>
